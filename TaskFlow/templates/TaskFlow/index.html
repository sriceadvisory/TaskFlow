<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Demo UI</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Layout ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .5px; }
    header span { font-size: .8rem; opacity: .65; }

    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }

    /* ── Form elements ── */
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    label { font-size: .78rem; font-weight: 500; color: #555; }
    input, textarea, select {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: #4f46e5; }
    textarea { resize: vertical; min-height: 60px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 500;
      padding: 8px 16px;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-ghost   { background: transparent; color: #555; border: 1px solid #ddd; }
    .btn-sm      { padding: 4px 10px; font-size: .78rem; }

    /* ── Search bar ── */
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }
    .search-row input { flex: 1; }

    /* ── Task list ── */
    .task-item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #fff;
    }
    .task-item.done { opacity: .55; }
    .task-item input[type=checkbox] {
      width: 16px;
      height: 16px;
      margin-top: 3px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-weight: 600;
      font-size: .93rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-desc {
      font-size: .82rem;
      color: #666;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-meta {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      font-size: .7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 99px;
    }
    .p1 { background:#fee2e2; color:#b91c1c; }
    .p2 { background:#fef3c7; color:#92400e; }
    .p3 { background:#e0f2fe; color:#0369a1; }
    .p4 { background:#dcfce7; color:#166534; }
    .p5 { background:#f3f4f6; color:#374151; }
    .due { font-size: .72rem; color: #888; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
      align-items: center;
    }
    .pagination span { font-size: .82rem; color: #666; }

    /* ── Alerts ── */
    .alert {
      border-radius: 6px;
      padding: 10px 14px;
      font-size: .85rem;
      margin-bottom: 12px;
    }
    .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-ok    { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

    /* ── Login ── */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
    }
    .login-card { width: 100%; max-width: 360px; }
    .login-card h2 { font-size: 1.15rem; margin-bottom: 20px; text-align: center; }

    /* ── Logout ── */
    .logout-btn {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,.4);
      font-size: .78rem;
      padding: 4px 12px;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">{% verbatim %}
const { useState, useEffect, useCallback } = React;

const API = (typeof window !== 'undefined' ? window.location.origin : '') + '/api';

// ── Helpers ────────────────────────────────────────────────────────────────

function authHeaders(token) {
  return { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };
}

function priorityLabel(p) {
  const map = { 1: 'P1 Critical', 2: 'P2 High', 3: 'P3 Medium', 4: 'P4 Low', 5: 'P5 Minimal' };
  return map[p] || `P${p}`;
}

function priorityClass(p) {
  return `badge p${p}`;
}

// ── Components ─────────────────────────────────────────────────────────────

function Alert({ msg, type }) {
  if (!msg) return null;
  return <div className={`alert alert-${type}`}>{msg}</div>;
}

function LoginPage({ onLogin }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await fetch(`${API}/token/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || 'Invalid credentials');
      }
      const data = await res.json();
      onLogin(data.access, data.refresh, username);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="login-wrap">
      <div className="card login-card">
        <h2>Sign in to TaskFlow</h2>
        <Alert msg={error} type="error" />
        <form onSubmit={handleSubmit}>
          <div className="field">
            <label>Username</label>
            <input value={username} onChange={e => setUsername(e.target.value)} required autoFocus />
          </div>
          <div className="field">
            <label>Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required />
          </div>
          <button className="btn-primary" style={{width:'100%', marginTop:4}} disabled={loading}>
            {loading ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
      </div>
    </div>
  );
}

function CreateTaskForm({ token, onCreated }) {
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const fmt = d => d.toISOString().slice(0,10);

  const [title, setTitle]           = useState('');
  const [description, setDesc]      = useState('');
  const [priority, setPriority]     = useState('3');
  const [dueDate, setDueDate]       = useState(fmt(tomorrow));
  const [msg, setMsg]               = useState('');
  const [msgType, setMsgType]       = useState('ok');
  const [loading, setLoading]       = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setLoading(true);
    setMsg('');
    try {
      const res = await fetch(`${API}/tasks/`, {
        method: 'POST',
        headers: authHeaders(token),
        body: JSON.stringify({ title, description, priority: Number(priority), due_date: dueDate }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        const detail = Object.entries(data).map(([k,v]) => `${k}: ${v}`).join(' | ');
        throw new Error(detail || 'Failed to create task');
      }
      setMsg('Task created!');
      setMsgType('ok');
      setTitle(''); setDesc(''); setPriority('3'); setDueDate(fmt(tomorrow));
      onCreated();
    } catch (err) {
      setMsg(err.message);
      setMsgType('error');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="card">
      <h2>New Task</h2>
      <Alert msg={msg} type={msgType} />
      <form onSubmit={handleSubmit}>
        <div className="field">
          <label>Title</label>
          <input value={title} onChange={e => setTitle(e.target.value)} required />
        </div>
        <div className="field">
          <label>Description</label>
          <textarea value={description} onChange={e => setDesc(e.target.value)} required />
        </div>
        <div className="row">
          <div className="field">
            <label>Priority</label>
            <select value={priority} onChange={e => setPriority(e.target.value)}>
              <option value="1">1 — Critical</option>
              <option value="2">2 — High</option>
              <option value="3">3 — Medium</option>
              <option value="4">4 — Low</option>
              <option value="5">5 — Minimal</option>
            </select>
          </div>
          <div className="field">
            <label>Due Date</label>
            <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} required />
          </div>
        </div>
        <button className="btn-primary" disabled={loading}>
          {loading ? 'Creating…' : 'Create Task'}
        </button>
      </form>
    </div>
  );
}

function TaskItem({ task, token, onRefresh }) {
  const [deleting, setDeleting]   = useState(false);
  const [toggling, setToggling]   = useState(false);

  async function toggleComplete() {
    setToggling(true);
    try {
      await fetch(`${API}/tasks/${task.id}/`, {
        method: 'PATCH',
        headers: authHeaders(token),
        body: JSON.stringify({ completed: !task.completed }),
      });
      onRefresh();
    } catch (_) {}
    finally { setToggling(false); }
  }

  async function deleteTask() {
    if (!confirm(`Delete "${task.title}"?`)) return;
    setDeleting(true);
    try {
      await fetch(`${API}/tasks/${task.id}/`, {
        method: 'DELETE',
        headers: authHeaders(token),
      });
      onRefresh();
    } catch (_) {}
    finally { setDeleting(false); }
  }

  return (
    <div className={`task-item${task.completed ? ' done' : ''}`}>
      <input
        type="checkbox"
        checked={task.completed}
        onChange={toggleComplete}
        disabled={toggling}
        title="Toggle complete"
      />
      <div className="task-body">
        <div className="task-title">{task.title}</div>
        {task.description && <div className="task-desc">{task.description}</div>}
        <div className="task-meta">
          <span className={priorityClass(task.priority)}>{priorityLabel(task.priority)}</span>
          <span className="due">Due {task.due_date}</span>
        </div>
      </div>
      <button
        className="btn-danger btn-sm"
        onClick={deleteTask}
        disabled={deleting}
        style={{flexShrink:0}}
      >
        {deleting ? '…' : 'Delete'}
      </button>
    </div>
  );
}

function TaskList({ token }) {
  const [tasks, setTasks]     = useState([]);
  const [search, setSearch]   = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [page, setPage]       = useState(1);
  const [total, setTotal]     = useState(0);
  const [ordering, setOrdering] = useState('-created_at');

  const PAGE_SIZE = 5;

  const fetchTasks = useCallback(async () => {
    setLoading(true);
    setError('');
    try {
      const params = new URLSearchParams({ page, ordering });
      if (search) params.set('search', search);
      const res = await fetch(`${API}/tasks/?${params}`, {
        headers: authHeaders(token),
      });
      if (!res.ok) throw new Error('Failed to load tasks');
      const data = await res.json();
      setTasks(data.results ?? data);
      setTotal(data.count ?? (data.results ?? data).length);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }, [token, page, search, ordering]);

  useEffect(() => { fetchTasks(); }, [fetchTasks]);

  const totalPages = Math.ceil(total / PAGE_SIZE);

  function handleSearch(e) {
    e.preventDefault();
    setPage(1);
    fetchTasks();
  }

  return (
    <div className="card">
      <h2>My Tasks {total > 0 && <span style={{fontWeight:400, color:'#888', fontSize:'.85rem'}}>({total})</span>}</h2>

      <div className="search-row">
        <input
          placeholder="Search tasks…"
          value={search}
          onChange={e => { setSearch(e.target.value); setPage(1); }}
        />
        <select value={ordering} onChange={e => { setOrdering(e.target.value); setPage(1); }} style={{flexShrink:0}}>
          <option value="-created_at">Newest first</option>
          <option value="created_at">Oldest first</option>
        </select>
        <button className="btn-ghost" onClick={fetchTasks} title="Refresh" style={{flexShrink:0}}>↻</button>
      </div>

      <Alert msg={error} type="error" />

      {loading && <p style={{color:'#888', fontSize:'.85rem', textAlign:'center', padding:'12px 0'}}>Loading…</p>}

      {!loading && tasks.length === 0 && (
        <p style={{color:'#aaa', fontSize:'.85rem', textAlign:'center', padding:'20px 0'}}>No tasks found.</p>
      )}

      {tasks.map(t => (
        <TaskItem key={t.id} task={t} token={token} onRefresh={fetchTasks} />
      ))}

      {totalPages > 1 && (
        <div className="pagination">
          <button className="btn-ghost btn-sm" onClick={() => setPage(p => p-1)} disabled={page === 1}>← Prev</button>
          <span>Page {page} of {totalPages}</span>
          <button className="btn-ghost btn-sm" onClick={() => setPage(p => p+1)} disabled={page === totalPages}>Next →</button>
        </div>
      )}
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────────────

function App() {
  const [token, setToken]       = useState(() => sessionStorage.getItem('tf_access') || '');
  const [username, setUsername] = useState(() => sessionStorage.getItem('tf_user') || '');
  const [listKey, setListKey]   = useState(0);

  function handleLogin(access, _refresh, user) {
    sessionStorage.setItem('tf_access', access);
    sessionStorage.setItem('tf_user', user);
    setToken(access);
    setUsername(user);
  }

  function handleLogout() {
    sessionStorage.clear();
    setToken('');
    setUsername('');
  }

  return (
    <>
      <header>
        <h1>TaskFlow</h1>
        {token
          ? <div style={{display:'flex', alignItems:'center', gap:12}}>
              <span>Signed in as <strong>{username}</strong></span>
              <button className="logout-btn" onClick={handleLogout}>Sign out</button>
            </div>
          : <span>Demo UI</span>
        }
      </header>

      {!token
        ? <LoginPage onLogin={handleLogin} />
        : <div className="container">
            <CreateTaskForm token={token} onCreated={() => setListKey(k => k+1)} />
            <TaskList key={listKey} token={token} />
          </div>
      }
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
{% endverbatim %}</script>
</body>
</html>
